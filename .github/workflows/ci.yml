name: Java CI with Maven

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests and Check Coverage
        # Lệnh này sẽ fail nếu coverage < 80%
        run: mvn verify

      - name: Upload JaCoCo Report
        # Luôn chạy bước này kể cả khi test fail để còn biết chỗ nào thiếu test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/